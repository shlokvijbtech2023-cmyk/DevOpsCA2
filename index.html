<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Feedback Form</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="right">
  <div class="box">

    <h2>Student Feedback</h2>

    <form id="f" novalidate>

      <label>Student Name</label>
      <input id="name" type="text">
      <div id="nmsg" class="err"></div>

      <label>Email ID</label>
      <input id="email" type="text">
      <div id="emsg" class="err"></div>

      <label>Mobile Number</label>
      <input id="mobile" type="text" maxlength="10">
      <div id="mmsg" class="err"></div>

      <label>Department</label>
      <select id="dept">
        <option value="">Select</option>
        <option>CSE</option>
        <option>IT</option>
        <option>ENTC</option>
        <option>Mechanical</option>
      </select>
      <div id="dmsg" class="err"></div>

      <label>Gender</label>
      <div class="row">
        <label><input type="radio" name="g"> Male</label>
        <label><input type="radio" name="g"> Female</label>
        <label><input type="radio" name="g"> Other</label>
      </div>
      <div id="gmsg" class="err"></div>

      <label>Feedback Comments</label>
      <textarea id="fb"></textarea>
      <div id="fmsg" class="err"></div>

      <div class="btns">
        <button type="submit" id="submit">Submit</button>
        <button type="reset" id="reset">Reset</button>
      </div>

      <div id="ok"></div>

    </form>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
